📖 Doutor da Igreja por sua profundidade espiritual e influência na vida monástica.

“José foi constituído fiel guardião do mistério da Encarnação.” (cf. Homilia II, _Super Missus Est_, séc. XII)

São Bernardo contempla São José como o homem do silêncio que sustenta o maior mistério da história.
A santidade não está no destaque, mas na fidelidade.

👉 Hoje: Faça algo bom hoje sem que ninguém perceba.

🙏 São José, ensina-nos a sermos grandes no oculto." />
